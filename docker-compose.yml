services:

  # ── Serveur MCP ─
  mcp:
    build:
      context: ./mcp_serveur
      dockerfile: Dockerfile
    container_name: mcp-serveur
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./database:/database
    ports:
      - "8000:8000"
    networks:
      - mcp-net

  # ── Dashboard React ──
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: mcp-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mcp
    networks:
      - mcp-net

# ── Nginx ──
  nginx:
    image: nginx:alpine
    container_name: mcp-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - mcp
      - dashboard
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge
